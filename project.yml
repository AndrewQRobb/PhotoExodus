name: PhotoExodus
options:
  bundleIdPrefix: com.andrewrobb
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  PhotoExodusCore:
    path: .

targets:
  PhotoExodus:
    type: application
    platform: macOS
    sources:
      - path: Sources/PhotoExodus
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewrobb.PhotoExodus
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/PhotoExodus.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: PhotoExodusCore
        product: PhotoExodusCore
  PhotoExodusCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PhotoExodusCoreTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: PhotoExodusCore
        product: PhotoExodusCore
